<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flipkart Clone</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f1f3f6;
}

/* Navbar */

.navbar{
    background:#2874f0;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.search-box input{
    width:350px;
    padding:10px;
    border:none;
    border-radius:5px;
}

.nav-links button{
    background:white;
    color:#2874f0;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

/* Banner */

.banner{
    background:url('https://images.unsplash.com/photo-1523275335684-37898b6baf30');
    background-size:cover;
    background-position:center;
    height:300px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:40px;
    font-weight:bold;
}

/* Product Section */

.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:30px;
}

/* Product Card */

.card{
    width:230px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
    text-align:center;
}

.card-content h3{
    margin:10px 0;
}

.price{
    color:green;
    font-size:20px;
    font-weight:bold;
}

button{
    background:#fb641b;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#e85a14;
}

/* Footer */

footer{
    background:#172337;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}

</style>
</head>

<body>

<!-- Navbar -->

<div class="navbar">

    <div class="logo">Flipkart</div>

    <div class="search-box">
        <input type="text" placeholder="Search for products">
    </div>

    <div class="nav-links">
        <button>Login</button>
    </div>

</div>
<div class="menu">
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('dining')">shop</a>
<a onclick="showPage('delivery')">Delivery</a>
<a onclick="showPage('nightlife')">cantact</a>
</div>

</div>


<!-- Banner -->

<div class="banner">
    BIG SALE 50% OFF 🔥
</div>

<!-- Products -->

<div class="products">

    <!-- Product 1 -->

    <div class="card">
        <img src="https://up.yimg.com/ib/th/id/OIP.GitpMgRQBQtPA9Xv_XuYJgHaHa?pid=Api&rs=1&c=1&qlt=95&w=92&h=92">

        <div class="card-content">
            <h3>Smart Watch</h3>

            <p class="price">₹1,999</p>

            <button>Add to Cart</button>
        </div>
    </div>

    <!-- Product 2 -->

    <div class="card">
        <img src="https://up.yimg.com/ib/th/id/OIP.v6S3uyg9Z4UAN3s9Rh7qVwHaLH?pid=Api&rs=1&c=1&qlt=95&w=80&h=120">

        <div class="card-content">
            <h3>Headphones</h3>

            <p class="price">₹999</p>

            <button>Add to Cart</button>
        </div>
    </div>

    <!-- Product 3 -->

    <div class="card">
        <img src="https://up.yimg.com/ib/th/id/OIP.6tDFP_GZK1rRdBN8jOGJhgHaDt?pid=Api&rs=1&c=1&qlt=95&w=194&h=97">

        <div class="card-content">
            <h3>Running Shoes</h3>

            <p class="price">₹2,499</p>

            <button>Add to Cart</button>
        </div>
    </div>

    <!-- Product 4 -->

    <div class="card">
        <img src="https://up.yimg.com/ib/th/id/OIP.JJnZ_hc-OPIRrS-5pYjWLgHaHa?pid=Api&rs=1&c=1&qlt=95&w=110&h=110">

        <div class="card-content">
            <h3>Backpack</h3>

            <p class="price">₹799</p>

            <button>Add to Cart</button>
        </div>
    </div>

</div>

<!-- Footer -->

<footer>
    © 2026 Flipkart Clone | Designed using HTML & CSS
</footer>

</body>
</html>
